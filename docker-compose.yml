services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: bdblendlap
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama

  ollama-init:
    image: ollama/ollama
    depends_on:
      - ollama
    entrypoint: ["/bin/sh", "-c"]
    command: "sleep 4 && ollama pull ${OLLAMA_MODEL:-llama3.2:1b}"
    environment:
      OLLAMA_HOST: http://ollama:11434

  api:
    build: .
    env_file:
      - .env
    environment:
      PORT: 3000
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: bdblendlap
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2:1b}
    volumes:
      - ./public/images:/app/public/images
    ports:
      - "3000:3000"
    depends_on:
      - db
      - ollama
      - ollama-init

volumes:
  mysql_data:
  ollama:

